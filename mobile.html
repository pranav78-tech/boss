<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* Looks like a normal notes app header */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .top-bar h1 {
      font-size: 17px;
      font-weight: 600;
      color: #e5e5e5;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #3b82f6;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    /* Hidden file input for camera */
    #cam-input { display: none; }

    /* Content area */
    .content {
      padding: 12px 14px 100px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      color: #444;
      margin-top: 30vh;
      font-size: 14px;
      line-height: 1.8;
    }

    /* Card */
    .note-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 12px 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .note-time {
      font-size: 10px;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .note-body {
      font-size: 13px;
      line-height: 1.6;
      color: #d4d4d4;
      word-break: break-word;
    }

    /* Markdown styling */
    .note-body h1, .note-body h2, .note-body h3 {
      color: #60a5fa;
      font-size: 14px;
      margin: 8px 0 4px;
    }
    .note-body strong { color: #fff; }
    .note-body code {
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11.5px;
      color: #fbbf24;
    }
    .note-body pre {
      background: #0c0c0c;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
      position: relative;
    }
    .note-body pre code {
      background: transparent;
      color: #d4d4d4;
      font-size: 11px;
      display: block;
      white-space: pre;
    }
    .note-body ul, .note-body ol { margin-left: 18px; }
    .note-body li { margin-bottom: 3px; }
    .note-body p { margin-bottom: 6px; }
    .note-body blockquote {
      border-left: 2px solid #3b82f6;
      padding-left: 10px;
      color: #888;
      margin: 6px 0;
    }

    /* Copy button on code blocks */
    .copy-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid #333;
      color: #aaa;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .copy-btn.done { background: #166534; color: #4ade80; border-color: #22c55e; }

    /* Loading spinner */
    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      animation: shimmer 1.2s infinite;
      display: none;
    }
    .loading-bar.active { display: block; }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Processing indicator inside card */
    .processing {
      color: #555;
      font-style: italic;
    }
    .processing::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* Bottom capture bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 10px;
    }

    .capture-btn {
      flex: 1;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .capture-btn:active { transform: scale(0.97); background: #1e40af; }
    .capture-btn:disabled { opacity: 0.4; }

    .clear-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
  <div class="loading-bar" id="loader"></div>

  <div class="top-bar">
    <h1><span class="status-dot" id="dot"></span> Notes</h1>
    <div class="top-actions">
      <button class="icon-btn" onclick="toggleSSE()" id="sse-btn" title="Live sync">🔗</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty">
      Tap 📷 to capture<br>AI response appears here
    </div>
  </div>

  <input type="file" id="cam-input" accept="image/*" capture="environment">

  <div class="bottom-bar">
    <button class="capture-btn" id="cap-btn" onclick="document.getElementById('cam-input').click()">📷 Capture</button>
    <button class="clear-btn" onclick="clearAll()">✕</button>
  </div>

  <script>
    const API = window.location.origin;
    const content = document.getElementById('content');
    const empty = document.getElementById('empty');
    const loader = document.getElementById('loader');
    const dot = document.getElementById('dot');
    const capBtn = document.getElementById('cap-btn');
    const sseBtn = document.getElementById('sse-btn');

    let evtSource = null;
    let sseOn = false;
    let noteCount = 0;

    // ===== CAMERA CAPTURE =====
    document.getElementById('cam-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const base64 = await fileToBase64(file);
      e.target.value = '';

      await solveImage(base64);
    });

    function fileToBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    // ===== SOLVE VIA STREAMING ENDPOINT =====
    async function solveImage(base64) {
      capBtn.disabled = true;
      capBtn.textContent = '⏳ Processing...';
      loader.classList.add('active');
      empty.style.display = 'none';

      noteCount++;
      const card = createCard(`Capture #${noteCount}`);
      const body = card.querySelector('.note-body');
      body.innerHTML = '<span class="processing">Analyzing</span>';
      content.prepend(card);

      try {
        const response = await fetch(`${API}/solve-mcqs-base64-stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'premium-token': 'admin-token'
          },
          body: JSON.stringify({ image: base64, contextHistory: [] })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.text) {
                  fullText += data.text;
                  body.innerHTML = marked.parse(fullText);
                  addCopyButtons(body);
                  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
              } catch (e) {}
            }
          }
        }

        if (!fullText) {
          body.innerHTML = '<span style="color:#f87171">No response received</span>';
        }

      } catch (err) {
        body.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
      }

      capBtn.disabled = false;
      capBtn.textContent = '📷 Capture';
      loader.classList.remove('active');
    }

    // ===== SSE LIVE SYNC (optional — receive answers from desktop app) =====
    function toggleSSE() {
      if (sseOn) {
        if (evtSource) evtSource.close();
        evtSource = null;
        sseOn = false;
        dot.classList.remove('live');
        sseBtn.style.color = '#3b82f6';
      } else {
        connectSSE();
      }
    }

    function connectSSE() {
      evtSource = new EventSource(`${API}/api/stealth-global-stream`);
      sseOn = true;

      evtSource.onopen = () => {
        dot.classList.add('live');
        sseBtn.style.color = '#22c55e';
      };

      evtSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (!data.text) return;
          empty.style.display = 'none';
          noteCount++;
          const card = createCard(`Sync #${noteCount}`);
          const body = card.querySelector('.note-body');
          const clean = data.text.replace(/<think>[\s\S]*?<\/think>\s*/gi, '');
          body.innerHTML = marked.parse(clean);
          addCopyButtons(body);
          content.prepend(card);
        } catch (e) {}
      };

      evtSource.onerror = () => {
        dot.classList.remove('live');
        sseBtn.style.color = '#ef4444';
      };
    }

    // ===== HELPERS =====
    function createCard(label) {
      const card = document.createElement('div');
      card.className = 'note-card';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      card.innerHTML = `
        <div class="note-time">${label} · ${time}</div>
        <div class="note-body"></div>
      `;
      return card;
    }

    function addCopyButtons(container) {
      container.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => {
          const code = pre.querySelector('code');
          const text = code ? code.innerText : pre.innerText;
          navigator.clipboard.writeText(text.trim()).then(() => {
            btn.textContent = '✓';
            btn.classList.add('done');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 1500);
          }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = text.trim();
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.textContent = '✓';
            setTimeout(() => btn.textContent = 'Copy', 1500);
          });
        };
        pre.style.position = 'relative';
        pre.appendChild(btn);
      });
    }

    function clearAll() {
      content.innerHTML = '';
      noteCount = 0;
      empty.style.display = '';
      content.appendChild(empty);
    }

    // Load history on open
    async function loadHistory() {
      try {
        const res = await fetch(`${API}/api/stealth-history`);
        const data = await res.json();
        if (data.success && data.history && data.history.length > 0) {
          empty.style.display = 'none';
          data.history.slice(-10).reverse().forEach(item => {
            noteCount++;
            const card = createCard(`Note #${noteCount}`);
            const body = card.querySelector('.note-body');
            const clean = (item.text || '').replace(/<think>[\s\S]*?<\/think>\s*/gi, '');
            body.innerHTML = marked.parse(clean);
            addCopyButtons(body);
            content.appendChild(card);
          });
        }
      } catch (e) {}
    }
    loadHistory();
  </script>
</body>
</html>
